name: Build and publish Syncplay image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      syncplay_version:
        description: 'Optional override, for example 1.7.5'
        required: false
        default: ''
        type: string
      image_tag:
        description: 'Optional extra image tag, for example stable or 1.7.5'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve Syncplay version
        id: version
        shell: bash
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < .syncplay-version)"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.syncplay_version }}" ]]; then
            VERSION="${{ inputs.syncplay_version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
            VERSION="${RAW_TAG#v}"
          else
            VERSION="${FILE_VERSION}"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            EXTRA_TAG="${{ inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            EXTRA_TAG="${VERSION}"
          else
            EXTRA_TAG=""
          fi

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${EXTRA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=${{ steps.version.outputs.extra_tag }},enable=${{ steps.version.outputs.extra_tag != '' }}
          labels: |
            org.opencontainers.image.title=Syncplay Server
            org.opencontainers.image.description=Containerized Syncplay server with Tailscale sidecar support
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SYNCPLAY_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=syncplay
          cache-to: type=gha,mode=max,scope=syncplay
