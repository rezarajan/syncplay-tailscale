name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read Syncplay version
        id: version
        run: echo "value=$(tr -d '[:space:]' < .syncplay-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare env file for Compose validation
        run: |
          cp .env.example .env
          sed -i "s/^SYNCPLAY_VERSION=.*/SYNCPLAY_VERSION=${{ steps.version.outputs.value }}/" .env

      - name: Validate Compose config
        run: docker compose config

      - name: Build Syncplay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/syncplay:test
          build-args: |
            SYNCPLAY_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=syncplay
          cache-to: type=gha,mode=max,scope=syncplay

      - name: Smoke test image
        run: |
          cid=$(docker run -d --rm \
            -e SYNCPLAY_PORT=8999 \
            -e SYNCPLAY_INTERFACE_IPV4=0.0.0.0 \
            local/syncplay:test)

          sleep 5
          docker ps --filter "id=$cid" --filter "status=running"
          docker logs "$cid"
          docker stop "$cid"
  publish:
    name: Build and publish GHCR image
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.validate.outputs.syncplay_version }}
            type=raw,value=${{ needs.validate.outputs.extra_tag }},enable=${{ needs.validate.outputs.extra_tag != '' }}
          labels: |
            org.opencontainers.image.title=Syncplay Server
            org.opencontainers.image.description=Containerized Syncplay server with Tailscale sidecar support
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.validate.outputs.syncplay_version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SYNCPLAY_VERSION=${{ needs.validate.outputs.syncplay_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=syncplay
          cache-to: type=gha,mode=max,scope=syncplay
