name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read Syncplay version
        id: version
        run: echo "value=$(tr -d '[:space:]' < .syncplay-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare env file for Compose validation
        run: |
          cp .env.example .env
          sed -i "s/^SYNCPLAY_VERSION=.*/SYNCPLAY_VERSION=${{ steps.version.outputs.value }}/" .env

      - name: Validate Compose config
        run: docker compose config

      - name: Build Syncplay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/syncplay:test
          build-args: |
            SYNCPLAY_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=syncplay
          cache-to: type=gha,mode=max,scope=syncplay

      - name: Smoke test image
        run: docker run --rm local/syncplay:test syncplay-server
